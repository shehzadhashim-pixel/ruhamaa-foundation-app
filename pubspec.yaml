name: ruhamaa_foundation
description: Ruhamaa Foundation Employee Tracking and Field Auditing App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core & services
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.7

  # State Management
  provider: ^6.1.2

  # Maps, Location & Geofencing
  google_maps_flutter: ^2.5.3
  location: ^5.0.3

  # Local cache and storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # Images and Watermarking
  image_picker: ^1.0.7
  image: ^4.1.3

  # Utilities
  intl: ^0.19.0
  fl_chart: ^0.66.0
  font_awesome_flutter: ^10.7.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
